<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Ďakujeme</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Raleway', sans-serif;
      background: #edeae7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 40px 50px;
      border-radius: 22px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    p {
      font-size: 18px;
      margin-bottom: 25px;
    }
    a {
      display: inline-block;
      padding: 14px 26px;
      background: #ff5757;
      color: white;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.25s;
    }
    a:hover {
      background: #e14c4c;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Ďakujeme!</h1>
    <p>Správa bola úspešne odoslaná. Ozveme sa vám čoskoro.</p>
    <a href="https://tvojemeno.github.io/kontaktujte-nas/">Späť na stránku</a>
  </div>
</body>
</html>
